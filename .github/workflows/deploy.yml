name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: dev
        type: choice
        options: [dev, prod]

jobs:
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    environment: dev
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build fat JARs
        run: ./gradlew bootJar

      - name: Configure AWS credentials (Dev)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.DEV_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.DEV_AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Run Flyway migrations
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/migrations/sql:/flyway/sql \
            flyway/flyway:10 \
            -url="${{ secrets.DEV_FLYWAY_URL }}" \
            -user="${{ secrets.DEV_FLYWAY_USER }}" \
            -password="${{ secrets.DEV_FLYWAY_PASSWORD }}" \
            migrate

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: infra/package-lock.json

      - name: Install CDK dependencies
        working-directory: infra
        run: npm ci

      - name: CDK Deploy (Dev)
        working-directory: infra
        env:
          AWS_ACCOUNT_DEV: ${{ secrets.AWS_ACCOUNT_DEV }}
        run: npx cdk deploy --all --context env=dev --require-approval never

      - name: Smoke test — Auth health
        run: |
          API_URL="${{ secrets.DEV_API_URL }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${API_URL}/auth/health" || echo "000")
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test failed — status $STATUS"
            exit 1
          fi

  deploy-prod:
    name: Deploy to Prod
    runs-on: ubuntu-latest
    environment: prod
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build fat JARs
        run: ./gradlew bootJar

      - name: Configure AWS credentials (Prod)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.PROD_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.PROD_AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Run Flyway migrations (Prod)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/migrations/sql:/flyway/sql \
            flyway/flyway:10 \
            -url="${{ secrets.PROD_FLYWAY_URL }}" \
            -user="${{ secrets.PROD_FLYWAY_USER }}" \
            -password="${{ secrets.PROD_FLYWAY_PASSWORD }}" \
            migrate

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: infra/package-lock.json

      - name: Install CDK dependencies
        working-directory: infra
        run: npm ci

      - name: CDK Deploy (Prod)
        working-directory: infra
        env:
          AWS_ACCOUNT_PROD: ${{ secrets.AWS_ACCOUNT_PROD }}
        run: npx cdk deploy --all --context env=prod

      - name: Post-deploy CloudWatch alarm watch (15 min)
        run: |
          echo "Monitoring CloudWatch alarms for 15 minutes post-deploy..."
          sleep 900
          ALARM_STATE=$(aws cloudwatch describe-alarms \
            --alarm-name-prefix "deathtrap-prod" \
            --state-value ALARM \
            --query 'MetricAlarms[*].AlarmName' \
            --output text)
          if [ -n "$ALARM_STATE" ]; then
            echo "ALARMS in ALARM state: $ALARM_STATE"
            exit 1
          fi
          echo "No alarms triggered — deploy looks healthy"
